// ─── BANCO DE DADOS — IndexedDB ───────────────────────────────
// Tabelas: users · expenses · incomes · cards · history_log
// ═══════════════════════════════════════════════════════════════
const DB_NAME    = "financaspro_prod_v1";
const DB_VERSION = 1;
const LS_UID_KEY = "financaspro_prod_uid";
const LS_CNT_KEY = "financaspro_prod_exp_count";

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = (e) => {
      const db = e.target.result;
      // ── users ──────────────────────────────────────────────
      if (!db.objectStoreNames.contains("users")) {
        const s = db.createObjectStore("users", { keyPath: "id", autoIncrement: true });
        s.createIndex("email", "email", { unique: true });
      }
      // ── cards ──────────────────────────────────────────────
      // campos: name, color, flag, last4, limit, dueDay, userId, createdAt
      if (!db.objectStoreNames.contains("cards")) {
        const s = db.createObjectStore("cards", { keyPath: "id", autoIncrement: true });
        s.createIndex("userId", "userId");
        s.createIndex("name",   "name");
      }
      // ── expenses ───────────────────────────────────────────
      // campos: desc, amount, category, card, date, month, year, userId, createdAt
      if (!db.objectStoreNames.contains("expenses")) {
        const s = db.createObjectStore("expenses", { keyPath: "id", autoIncrement: true });
        s.createIndex("userId",   "userId");
        s.createIndex("month",    "month");
        s.createIndex("category", "category");
        s.createIndex("card",     "card");
        s.createIndex("date",     "date");
      }
      // ── incomes ────────────────────────────────────────────
      // campos: desc, amount, category, date, month, year, userId, createdAt
      if (!db.objectStoreNames.contains("incomes")) {
        const s = db.createObjectStore("incomes", { keyPath: "id", autoIncrement: true });
        s.createIndex("userId",   "userId");
        s.createIndex("month",    "month");
        s.createIndex("category", "category");
        s.createIndex("date",     "date");
      }
      // ── history_log ────────────────────────────────────────
      // campos: userId, type, action, payload, createdAt
      if (!db.objectStoreNames.contains("history_log")) {
        const s = db.createObjectStore("history_log", { keyPath: "id", autoIncrement: true });
        s.createIndex("userId",    "userId");
        s.createIndex("type",      "type");
        s.createIndex("action",    "action");
        s.createIndex("createdAt", "createdAt");
      }
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror   = () => reject(req.error);
  });
}

async function dbAdd(store, rec) {
  const db = await openDB();
  return new Promise((res, rej) => {
    const r = db.transaction(store,"readwrite").objectStore(store).add(rec);
    r.onsuccess = () => res(r.result);
    r.onerror   = () => rej(r.error);
  });
}

async function dbPut(store, rec) {
  const db = await openDB();
  return new Promise((res, rej) => {
    const r = db.transaction(store,"readwrite").objectStore(store).put(rec);
    r.onsuccess = () => res(r.result);
    r.onerror   = () => rej(r.error);
  });
}

async function dbDelete(store, id) {
  const db = await openDB();
  return new Promise((res, rej) => {
    const r = db.transaction(store,"readwrite").objectStore(store).delete(id);
    r.onsuccess = () => res();
    r.onerror   = () => rej(r.error);
  });
}

async function dbByIndex(store, idx, val) {
  const db = await openDB();
  return new Promise((res, rej) => {
    const r = db.transaction(store,"readonly").objectStore(store).index(idx).getAll(val);
    r.onsuccess = () => res(r.result);
    r.onerror   = () => rej(r.error);
  });
}

async function dbGetAll(store) {
  const db = await openDB();
  return new Promise((res, rej) => {
    const r = db.transaction(store,"readonly").objectStore(store).getAll();
    r.onsuccess = () => res(r.result);
    r.onerror   = () => rej(r.error);
  });
}

async function logAction(userId, type, action, payload) {
  await dbAdd("history_log", { userId, type, action, payload: JSON.stringify(payload), createdAt: new Date().toISOString() });
}

async function loginOrCreate(email, name, avatar) {
  // ── Âncora de userId no localStorage ──────────────────────────
  // Se o IndexedDB for limpo pelo browser, o userId salvo no localStorage
  // permite re-criar o usuário com o MESMO id, evitando dados órfãos.
  const savedId = localStorage.getItem(LS_UID_KEY);

  const db = await openDB();
  return new Promise((res, rej) => {
    const tx    = db.transaction("users","readwrite");
    const store = tx.objectStore("users");

    // tenta buscar pelo id salvo primeiro
    if (savedId) {
      const byId = store.get(parseInt(savedId));
      byId.onsuccess = () => {
        if (byId.result) { res(byId.result); return; }
        // id salvo mas usuário não existe — recria com id fixo
        const rec = { id: parseInt(savedId), email, name, avatar, createdAt: new Date().toISOString() };
        const put = store.put(rec); // put respeita o id fornecido
        put.onsuccess = () => res(rec);
        put.onerror   = () => rej(put.error);
      };
      byId.onerror = () => rej(byId.error);
      return;
    }

    // primeiro acesso — busca por email ou cria novo
    const byEmail = store.index("email").get(email);
    byEmail.onsuccess = () => {
      if (byEmail.result) {

// ─── Lógica de período de fatura ─────────────────────────────
// Dado o dia de vencimento (dueDay), retorna a janela de fatura atual:
//   start = dueDay do mês anterior  (inclusive)
//   end   = dueDay do mês atual - 1 (inclusive, último dia da fatura)
//   label = "Fatura Mmm/YYYY" (mês do vencimento)
// Se hoje >= dueDay → a fatura atual já fechou, abre a próxima janela.
function billingPeriod(dueDay) {
  const today      = new Date();
  const todayDay   = today.getDate();
  const todayMonth = today.getMonth(); // 0-based
  const todayYear  = today.getFullYear();

  // Regra:
  // se hoje < dueDay  → fatura vence este mês  (compras de dueDay mês passado até hoje)
  // se hoje >= dueDay → fatura já fechou, próxima vence mês que vem
  let dueMonth = todayMonth;
  let dueYear  = todayYear;
  if (todayDay >= dueDay) {
    dueMonth++;
    if (dueMonth > 11) { dueMonth = 0; dueYear++; }
  }

  // start = dueDay do mês ANTERIOR ao vencimento (inclusive)
  let startMonth = dueMonth - 1; let startYear = dueYear;
  if (startMonth < 0) { startMonth = 11; startYear--; }
  const lastDayStart = new Date(startYear, startMonth + 1, 0).getDate();
  const startDay     = Math.min(dueDay, lastDayStart);
  const startStr     = `${startYear}-${String(startMonth+1).padStart(2,"0")}-${String(startDay).padStart(2,"0")}`;

  // end = dueDay - 1 do mês de vencimento (inclusive)
  const lastDayDue = new Date(dueYear, dueMonth + 1, 0).getDate();
  let endDay = Math.min(dueDay, lastDayDue) - 1;
  let endMonth = dueMonth; let endYear = dueYear;
  if (endDay < 1) { endMonth--; if (endMonth < 0) { endMonth = 11; endYear--; } endDay = new Date(endYear, endMonth + 1, 0).getDate(); }
  const endStr = `${endYear}-${String(endMonth+1).padStart(2,"0")}-${String(endDay).padStart(2,"0")}`;

  const label = `Fatura ${MONTHS[dueMonth]}/${dueYear}`;
  return { start: startStr, end: endStr, label, dueDay, dueMonth, dueYear };
}

// Gera lista de períodos de fatura para os últimos N meses
// Estratégia: começa da fatura atual e vai recuando mês a mês
function billingPeriods(dueDay, count = 8) {
  const periods = [];
  // periods[0] = fatura atual — gerada pela mesma função billingPeriod para garantir consistência
  const current = billingPeriod(dueDay);
  periods.push({ start: current.start, end: current.end, label: current.label, key: `${current.dueYear}-${String(current.dueMonth+1).padStart(2,"0")}` });

  // faturas anteriores: recua mês a mês a partir do dueMonth da fatura atual
  for (let i = 1; i < count; i++) {
    let dueMonth = current.dueMonth - i;
    let dueYear  = current.dueYear;
    while (dueMonth < 0) { dueMonth += 12; dueYear--; }

    let startMonth = dueMonth - 1; let startYear = dueYear;
    if (startMonth < 0) { startMonth = 11; startYear--; }
    const lastDayStart = new Date(startYear, startMonth + 1, 0).getDate();
    const startDay     = Math.min(dueDay, lastDayStart);
    const startStr     = `${startYear}-${String(startMonth+1).padStart(2,"0")}-${String(startDay).padStart(2,"0")}`;

    const lastDayDue = new Date(dueYear, dueMonth + 1, 0).getDate();
    const clampedDue = Math.min(dueDay, lastDayDue);
    let endDay = clampedDue - 1; let endMonth = dueMonth; let endYear = dueYear;
    if (endDay < 1) { endMonth--; if (endMonth < 0) { endMonth = 11; endYear--; } endDay = new Date(endYear, endMonth + 1, 0).getDate(); }
    const endStr = `${endYear}-${String(endMonth+1).padStart(2,"0")}-${String(endDay).padStart(2,"0")}`;

    const label = `Fatura ${MONTHS[dueMonth]}/${dueYear}`;
    const key   = `${dueYear}-${String(dueMonth+1).padStart(2,"0")}`;
    periods.push({ start: startStr, end: endStr, label, key });
  }
  return periods;
}

// avança uma data YYYY-MM-DD por N meses (mantém o dia, clampando ao último dia do mês)
function addMonths(dateStr, n) {
  const d = new Date(dateStr + "T12:00:00");
  const targetMonth = d.getMonth() + n;
  const y = d.getFullYear() + Math.floor(targetMonth / 12);
  const m = ((targetMonth % 12) + 12) % 12;
  const lastDay = new Date(y, m + 1, 0).getDate();
  const day = Math.min(d.getDate(), lastDay);
  return `${y}-${String(m+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
}

// Data padrão para nova despesa: hoje se estiver dentro da janela, senão start da janela
function defaultExpenseDate(dueDay) {
  if (!dueDay) return new Date().toISOString().slice(0,10);
  const period = billingPeriod(dueDay);
  const today  = new Date().toISOString().slice(0,10);
  if (today >= period.start && today <= period.end) return today;
  return period.start;
}

function textOnColor(hex) {
  const h = hex.replace("#","");
  const r=parseInt(h.slice(0,2),16),g=parseInt(h.slice(2,4),16),b=parseInt(h.slice(4,6),16);

}

const API_URL = "https://script.google.com/macros/s/AKfycbwVi1jc1uqLDd_yXS2sDClaBgbaenhmsN0cXVMI6Qsi2HbQMclTwglnCceWg4w1zX6Z/exec";

function SyncScreen({user, onBack, onSaved}) {
  const [status,  setStatus]  = useState("idle"); // idle | loading | preview | importing | done | error
  const [rawData, setRawData] = useState(null);
  const [preview, setPreview] = useState(null);   // { expenses, incomes, cards }
  const [errMsg,  setErrMsg]  = useState("");
  const [imported,setImported]= useState(null);

  // ── Busca e analisa a API ─────────────────────────────────────
  const fetchApi = async () => {
    const url = window._customApiUrl || API_URL;
    setStatus("loading"); setErrMsg(""); setRawData(null);
    let data = null;
    let lastErr = "";

    // Estratégia 1: fetch direto com CORS
    try {
      const res = await fetch(url, { method:"GET", redirect:"follow" });
      const text = await res.text();
      if (text.trim().startsWith("<")) {
        lastErr = "API retornou HTML (possível redirect de autenticação). Verifique se a planilha está publicada como 'Qualquer pessoa, mesmo anônimos'.";
      } else {
        data = JSON.parse(text);
      }
    } catch(e1) {
      lastErr = e1.message;
      try {
        await fetch(url, { method:"GET", mode:"no-cors", redirect:"follow" });
        lastErr = "CORS bloqueado pelo servidor. Veja as instruções abaixo.";
      } catch(e2) {
        lastErr = "Sem acesso à rede: " + e2.message;
      }
    }

    if (!data) {
      setErrMsg(lastErr);
      setStatus("error");
      return;
    }

    setRawData(data);
    const p = parseApiData(data, user.id);
    setPreview(p);
    setStatus("preview");
  };

  // ── Parser exato para o formato real da API ──────────────────
  const parseApiData = (data, userId) => {
    const expenses = [], incomes = [], cards = [];

    // converte DD/MM/YYYY → YYYY-MM-DD
    const parseDate = (v) => {
      if (!v) return new Date().toISOString().slice(0,10);
      const s = String(v).trim();
      if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
      const m = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);
      if (m) return `${m[3]}-${m[2].padStart(2,"0")}-${m[1].padStart(2,"0")}`;
      const d = new Date(s); if (!isNaN(d)) return d.toISOString().slice(0,10);
      return new Date().toISOString().slice(0,10);
    };

    // mapeia categoria da API para categorias do app
    const mapCategory = (cat, desc) => {
      const c = (cat||"").toLowerCase();
      const d = (desc||"").toLowerCase();
      if (/alimenta/i.test(c)) return "Alimentação";
      if (/transport/i.test(c)) return "Transporte";
      if (/moradia|aluguel|condom/i.test(c)) return "Moradia";
      if (/saúde|saude|medic|farmá/i.test(c)) return "Saúde";
      if (/lazer|entret/i.test(c)) return "Lazer";
      if (/educa|curso/i.test(c)) return "Educação";
      // "Contas" → tenta inferir pela descrição
      if (/contas/i.test(c)) {
        if (/luz|energia/i.test(d)) return "Moradia";
        if (/água|agua|condom/i.test(d)) return "Moradia";
        if (/pensão|pensao/i.test(d)) return "Outros";
        if (/empréstimo|emprestimo/i.test(d)) return "Outros";
        return "Outros";
      }
      return "Outros";
    };

    const rows = Array.isArray(data) ? data : [];

    rows.forEach(row => {
      const amount = parseFloat(row.valor) || 0;
      if (amount <= 0) return; // ignora MEI social e zeros

      const date     = parseDate(row.data);
      const d        = new Date(date+"T12:00:00");
      const month    = d.getMonth()+1;
      const year     = d.getFullYear();
      const desc     = String(row.descricao||"").trim();
      const category = mapCategory(row.categoria, desc);
      const card     = String(row.cartao||"").trim();
      const paid     = (row.status||"").toLowerCase() === "pago";
      const apiId    = row.id || null; // UUID da API — usado para dedup

      expenses.push({
        userId, desc, amount, category, card,
        date, month, year,
        paid,
        paidAt:    paid ? new Date().toISOString() : null,
        apiId,     // salva id original para evitar reimportação
        pagamento: row.pagamento || "",
        createdAt: new Date().toISOString(),
      });
    });

    return { expenses, incomes, cards };
  };

  // ── Importa para o banco ──────────────────────────────────────
  const doImport = async () => {
    if (!preview) return;
    setStatus("importing");

    // carrega apiIds já existentes para evitar duplicata
    const existingExp = await dbByIndex("expenses","userId",user.id);
    const existingApiIds = new Set(existingExp.map(e=>e.apiId).filter(Boolean));

    let counts = {expenses:0, incomes:0, cards:0, skipped:0};

    for (const e of preview.expenses) {
      if (e.apiId && existingApiIds.has(e.apiId)) { counts.skipped++; continue; }
      await dbAdd("expenses", e);
      counts.expenses++;
    }
    for (const i of preview.incomes)  { await dbAdd("incomes", i); counts.incomes++;  }
    for (const c of preview.cards)    { await dbAdd("cards",   c); counts.cards++;    }

    await logAction(user.id,"sync","import",{counts, source:API_URL});
    setImported(counts);
    setStatus("done");
    setTimeout(()=>{ onSaved(); onBack(); }, 2500);
  };
